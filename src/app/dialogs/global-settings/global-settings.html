<h2 mat-dialog-title>Global Settings</h2>
<mat-dialog-content>
  <div class="options">
    <section>
      <h3>
        Preferred Units
      </h3>
      <mat-button-toggle-group 
        aria-label="Unit type"
        [value]="preferredUnit()"
        (valueChange)="preferredUnit.set($event)">
        <mat-button-toggle value="metric">Metric</mat-button-toggle>
        <mat-button-toggle value="usc">US Customary</mat-button-toggle>
      </mat-button-toggle-group>
    </section>
    <section>
      <div class="email-header">
        <h3>Email Address</h3>
        <mat-icon
          class="help-icon"
          matTooltip="This will be the default email for export features.">
          help
        </mat-icon>
      </div>
      <mat-form-field>
        <mat-label>Email Address</mat-label>
        <input matInput [formControl]="emailControl" type="email" placeholder="user@hawaii.edu">
        
        @if(emailControl.hasError("email")) {
          <mat-error>Invalid email address. This value will not be saved</mat-error>
        }
      </mat-form-field>
    </section>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button aria-label="Save settings" (click)="close()">Cancel</button>
  <button mat-flat-button color="primary" aria-label="Cancel and close" (click)="saveSettings()">Save</button>
</mat-dialog-actions>
