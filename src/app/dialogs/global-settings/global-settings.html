<div class="container">
  <div class="content">
    <h1>
      Global Settings
    </h1>
    <div class="options">
      <section>
        <h3>
          Preferred Units
        </h3>
        <mat-button-toggle-group 
          aria-label="Unit type"
          [value]="preferredUnit()"
          (valueChange)="preferredUnit.set($event)">
          <mat-button-toggle value="metric">Metric</mat-button-toggle>
          <mat-button-toggle value="usc">US Customary</mat-button-toggle>
        </mat-button-toggle-group>
      </section>
    </div>
  </div>
  
  <div class="button-container">
    <button mat-flat-button aria-label="Save settings" (click)="saveSettings()">
      Save
    </button>
    <button mat-button aria-label="Cancel and close" (click)="close()">
      Cancel
    </button>
  </div>
</div>
