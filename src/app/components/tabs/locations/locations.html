@if(stationData(); as stationResource) {
  @if(stationResource.isLoading()) {
    <mat-spinner></mat-spinner>
  }
  @if(stationResource.value(); as stations) {
    <app-station-filters
      [manager]="stations">
    </app-station-filters>
    <app-station-table 
      [manager]="stations"
      [(selectedSkn)]="activeStationId">
    </app-station-table>
  }
}
@else if(streamData.isLoading()) {
  <div class="loader">Loading stream definitions...</div>
}
