
  @if(stationData(); as stationResource) {
  @if(stationResource.isLoading()) {
    <mat-spinner></mat-spinner>
  }
  @if(stationResource.value(); as stations) {
    <div class="container">
      <app-station-filters
        [manager]="stations">
      </app-station-filters>
      <div class="table-buffer">
        <app-station-table 
          [manager]="stations"
          [(selectedSkn)]="activeStationId">
        </app-station-table>
      </div>
    </div>
  }
}
