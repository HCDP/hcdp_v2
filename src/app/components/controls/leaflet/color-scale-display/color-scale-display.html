<div class="scale-display-container">
  <div class="scale-gradient-bar" [style.background]="displayData().gradient"></div>
  <div class="scale-labels">
    @for (label of displayData().labels; track $index) {
      <div class="scale-label-row">
        <span class="label-tick">-</span>
        <span class="label-text">{{ label }}</span>
      </div>
    }
  </div>
</div>
