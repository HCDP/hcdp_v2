
<div #legendContainer class="color-scale-container leaflet-bar leaflet-control">
  <button mat-icon-button class="config-btn" (click)="openConfig($event)">
    <mat-icon>settings</mat-icon>
  </button>
  <div class="scale-body">
    @if(activeScaleObj()) {
      <app-color-scale-display [colorScale]="activeScaleObj()!"></app-color-scale-display>
    }
  </div>

  
</div>
