<mat-tab-group class="tab-content" color="accent">
  <mat-tab label="Dataset Options">
    <div class="data-tab">
      <app-dataset-options></app-dataset-options>
    </div>
  </mat-tab>
  @for (tab of tabs; track tab) {
    <mat-tab style="background-color:red;" [label]="tab.label">
      <div class="data-tab">
        <ng-container appDynamicTabTemplate [component]="tab.component"></ng-container>
      </div>
    </mat-tab>
  }
</mat-tab-group>
