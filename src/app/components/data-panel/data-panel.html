
@if(dataset().visData) {
  <mat-tab-group class="tab-content" color="accent">
  @for(tab of dataset().visData.tabs; track tab) {
    <mat-tab [label]="tab.label">
      <div class="data-tab">
        <ng-container appDynamicTabTemplate [component]="tab.component" [dataset]="dataset()"></ng-container>
      </div>
    </mat-tab>
  }
  </mat-tab-group>
}
